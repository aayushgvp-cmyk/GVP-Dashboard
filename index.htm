<!DOCTYPE html>
<html>
<head>
<title>Title</title>
<link rel="stylesheet" href="CSS/Style.css">
<link rel="stylesheet" href="CSS/Mermaid.css">
</head>
<body>
<h1 id="pageTitle" style="position:relative;left:20%;width:80%;z-index:1;">GVP Finance Dashboard</h1>
<div style="position:absolute;top:0px;left:0px" id="LeftHandMenu"><table style="background-color:#CAF0F8;width:150px;height:120vw">
<tr style="position:absolute;top:2%;left:20px"><td><h2>Income</h2></td></tr>
<tr style="position:absolute;top:6%;left:20px" onclick="OnMenuClick(1)"><td><h3>Vertical-Wise Income</h3></td></tr>
<tr style="position:absolute;top:10%;left:20px" onclick="OnMenuClick(2)"><td><h3>Month-Wise Income</h3></td></tr>
<tr style="position:absolute;top:14%;left:20px" onclick="OnMenuClick(3)"><td><h3>Vertical-Wise Seminar-Wise</h3></td></tr>
<tr style="position:absolute;top:19%;left:20px" onclick="OnMenuClick(4)"><td><h3>Month-Wise Vertical-Wise</h3></td></tr>
<tr style="position:absolute;top:24%;left:20px" onclick="OnMenuClick(5)"><td><h3>Vertical-Wise Month-Wise</h3></td></tr>
<tr style="position:absolute;top:29%;left:20px" onclick="OnMenuClick(6)"><td><h3>Vertical-wise Month-wise Seminar-wise</h3></td></tr>
<tr style="position:absolute;top:34%;left:20px" onclick="OnMenuClick(7)"><td><h3>Seminar-wise Month-wise</h3></td></tr>
<tr style="position:absolute;top:40%;left:20px"><td><h2>Expenses</h2></td></tr>
</table></div>
<div id="DetailTable" style="position:absolute;top:150px"></div>

<div style="position:absolute;left:450px;top:160px;width:20%;z-index:0;" id="Loading"><img src="Assets/LoadingGif.gif" style="width:50%;"></div>
<div style="position:absolute;left:80%;top:80px" id="chartIncomeBack" onmousedown="OnBack()"><h2>BACK</h2></div>


<div id="VC" style="position:absolute;right:20%;top:60px;z-index:2"><label for="VDD">Select Vertical</label><select id="VDD"></select><template id="VTemplate"><option class="verticalOptionClass"></option></template></div>

<div id="MC" style="position:absolute;right:20%;top:60px"><label for="MDD">Select Month</label><select id="MDD"><option value=1>April</option><option value=2>May</option><option value=3>June</option><option value=4>July</option><option value=5>August</option><option value=6>September</option><option value=7>October</option><option value=8>November</option><option value=9>December</option><option value=10>January</option><option value=11>February</option><option value=12>March</option></select></div>

<div id="SC" style="position:absolute;right:20%;top:60px"><label for="SDD">Select Seminar</label><select id="SDD"></select><template id="STemplate"><option class="seminarOptionClass"></option></template></div>


<div class="chartClass" id="IncomeChartDiv"><canvas id="IncomeChartHTML"></canvas></div>

</body>
<script src="JS/chart.umd.min.js"></script>
<script src="JS/xlsx.full.min.js"></script>
<script src="JS/Grid.js"></script>
<script src="JS/Math.js"></script>
<script src="JS/Work.js"></script>
<script src="JS/ChartJSPlugins.js"></script>
<script src="JS/SheetWorkerObjectFormulae.js"></script>
<script src="JS/SheetWorker.js"></script>
<script src="JS/DetailTable.js"></script>
<script src="JS/IncomeChart.js"></script>
<script src="JS/CE.js"></script>
<script src="JS/GraphLoader.js"></script>
</html>
